networks:
  rag-network:
    driver: bridge

volumes:
  pgvector_data:
  ollama_data:


# ==============
# PG Vector Docker Container
# ==============

services:

  pgvector:
    image: pgvector/pgvector:pg17
    container_name: rag-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pgvector_isready -U postgres"]

# ==============
# Ollama Local LLM Container
# ==============

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag-network