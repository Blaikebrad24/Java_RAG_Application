networks:
  rag-network:
    driver: bridge

volumes:
  pgvector_data:


# ==============
# PG Vector Docker Container 
# ==============

services:

  pgvector:
    image: pgvector/pgvector:pg17
    container_name: rag-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pgvector_isready -U postgres"]