networks:
  rag-network:
    driver: bridge

volumes:
  postgres-data:


# ==============
# PG Vector Docker Container 
# ==============

services:

  pgvector:
    image: pgvector/pgvector:pg17
    container_name: rag-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pgvector_isready -U postgres"]