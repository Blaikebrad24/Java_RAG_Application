spring.application.name=JavaContent_RAG

spring.config.import=optional:file:.env[.properties]

etl.pipeline.DataStorage.dataPath=${DATA_PATH}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# OpenAI configurations
spring.ai.openai.api-key=${OPENAI_APIKEY}


# Anthropic Claude configurations
spring.ai.anthropic.api-key=${CLAUDE_APIKEY}

# Ollama Local LLM configurations
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen2.5:7b
spring.ai.ollama.chat.options.temperature=0.7